<!DOCTYPE html>
<html>
<head>
    <title>Syspro API Test</title>
</head>
<body>
    <h1>Syspro API Test Page</h1>
    <p>Testing backend connectivity...</p>
    
    <div id="results"></div>
    
    <script>
        async function testAPI() {
            const results = document.getElementById('results');
            
            try {
                // Test 1: Hello endpoint
                const helloResponse = await fetch('/api/hello');
                const helloData = await helloResponse.json();
                results.innerHTML += '<p>✅ Hello API: ' + JSON.stringify(helloData) + '</p>';
                
                // Test 2: Main API
                const apiResponse = await fetch('/api/');
                const apiData = await apiResponse.json();
                results.innerHTML += '<p>✅ Main API: ' + JSON.stringify(apiData) + '</p>';
                
                // Test 3: Health check
                const healthResponse = await fetch('/api/health');
                const healthData = await healthResponse.json();
                results.innerHTML += '<p>✅ Health API: ' + JSON.stringify(healthData) + '</p>';
                
            } catch (error) {
                results.innerHTML += '<p>❌ Error: ' + error.message + '</p>';
            }
        }
        
        // Run tests when page loads
        window.onload = testAPI;
    </script>
</body>
</html>
