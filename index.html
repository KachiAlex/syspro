<!DOCTYPE html>
<html>
<head>
    <title>Syspro API Test</title>
</head>
<body>
    <h1>Syspro API Test Page</h1>
    <p>Testing backend connectivity...</p>
    
    <div id="results"></div>
    
    <script>
        async function testAPI() {
            const results = document.getElementById('results');
            
            try {
                // Test 1: Hello endpoint
                const helloResponse = await fetch('/api/hello');
                const helloData = await helloResponse.json();
                results.innerHTML += '<p>✅ Hello API: ' + JSON.stringify(helloData) + '</p>';
                
                // Test 2: Login endpoint
                const loginResponse = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'admin@syspro.com', password: 'Admin@123' })
                });
                const loginData = await loginResponse.json();
                results.innerHTML += '<p>✅ Login API: ' + JSON.stringify(loginData) + '</p>';
                
            } catch (error) {
                results.innerHTML += '<p>❌ Error: ' + error.message + '</p>';
                console.error('API Test Error:', error);
            }
        }
        
        // Run tests when page loads
        window.onload = testAPI;
    </script>
</body>
</html>
