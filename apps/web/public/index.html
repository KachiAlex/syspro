<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syspro ERP - Test Page</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            margin: 1rem;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: white;
            font-size: 24px;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 0.5rem;
        }
        p {
            color: #6b7280;
            margin-bottom: 1.5rem;
        }
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .link {
            background: #3b82f6;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        .link:hover {
            background: #2563eb;
        }
        .info {
            background: #f3f4f6;
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1.5rem;
            text-align: left;
        }
        .info h3 {
            margin: 0 0 0.5rem 0;
            color: #1f2937;
        }
        .info ul {
            margin: 0;
            padding-left: 1.5rem;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>🎉 Syspro ERP Deployed!</h1>
        <p>Your application is successfully running on Vercel.</p>
        
        <div class="links">
            <a href="/test" class="link">Test Page</a>
            <a href="/login" class="link">Login</a>
            <a href="/api/health" class="link">API Health</a>
        </div>
        
        <div class="info">
            <h3>Deployment Information</h3>
            <ul>
                <li><strong>Framework:</strong> Next.js 14</li>
                <li><strong>Platform:</strong> Vercel</li>
                <li><strong>Status:</strong> Active</li>
                <li><strong>Build:</strong> Production</li>
            </ul>
        </div>
        
        <script>
            // Add timestamp
            document.addEventListener('DOMContentLoaded', function() {
                const info = document.querySelector('.info ul');
                const timestamp = new Date().toLocaleString();
                const li = document.createElement('li');
                li.innerHTML = '<strong>Deployed:</strong> ' + timestamp;
                info.appendChild(li);
            });
        </script>
    </div>
</body>
</html>
